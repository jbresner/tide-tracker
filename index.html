<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TideWatch</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="grain"></div>

  <header class="site-header">
    <div class="header-left">
      <span class="logo">TIDEWATCH</span>
      <span class="version">v1.0</span>
    </div>
    <div class="header-right">
      <div class="station-info">
        <span class="label">STATION</span>
        <span id="station-name" class="value">—</span>
      </div>
      <div class="station-info">
        <span class="label">DIST</span>
        <span id="station-dist" class="value">—</span>
      </div>
    </div>
  </header>

  <main>

    <!-- Status / loading overlay -->
    <div id="status-overlay" class="status-overlay">
      <div class="status-inner">
        <div class="status-icon" id="status-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4" class="spin"/>
            <circle cx="20" cy="20" r="6" fill="currentColor" class="pulse-dot"/>
          </svg>
        </div>
        <p id="status-text" class="status-text">Requesting location…</p>
        <button id="retry-btn" class="btn" style="display:none">Try Again</button>
      </div>
    </div>

    <!-- Current reading hero -->
    <section class="hero" id="hero" style="display:none">
      <div class="hero-reading">
        <div class="reading-block">
          <span class="reading-label">CURRENT TIDE</span>
          <span class="reading-value" id="current-level">—</span>
          <span class="reading-unit">ft</span>
        </div>
        <div class="reading-divider"></div>
        <div class="reading-block">
          <span class="reading-label">TREND</span>
          <span class="reading-value trend-value" id="trend-value">—</span>
        </div>
        <div class="reading-divider"></div>
        <div class="reading-block">
          <span class="reading-label">NEXT</span>
          <span class="reading-value" id="next-extreme-level">—</span>
          <span class="reading-unit">ft</span>
          <span class="reading-sublabel" id="next-extreme-label">—</span>
        </div>
      </div>
    </section>

    <!-- Chart container -->
    <section class="chart-section" id="chart-section" style="display:none">
      <div class="chart-scroll-wrapper" id="chart-scroll-wrapper">
        <div class="chart-inner" id="chart-inner">
          <canvas id="tide-canvas"></canvas>
          <div class="now-line" id="now-line"></div>
        </div>
      </div>
      <div class="chart-footer">
        <span class="scroll-hint" id="scroll-hint">← scroll to explore →</span>
        <span class="data-credit">Data: NOAA CO-OPS</span>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
